name: Publish Chrome Extension

on:
    push:
        tags:
            - "ext-v*"

jobs:
    build-and-publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Bump version from tag
              run: |
                  VERSION=$(echo "${{ github.ref_name }}" | sed 's/^ext-v//')
                  echo "Publishing version: $VERSION"
                  jq ".version = \"$VERSION\"" manifest.json > tmp.json && mv tmp.json manifest.json
                  echo "manifest.json version: $(jq -r '.version' manifest.json)"

            - name: Zip extension
              run: |
                  zip -r extension.zip manifest.json src/

            - name: Upload to Chrome Web Store
              uses: trmcnvn/chrome-addon@v2
              with:
                  extension: ${{ secrets.EXTENSION_ID }}
                  zip: extension.zip
                  client-id: ${{ secrets.CLIENT_ID }}
                  client-secret: ${{ secrets.CLIENT_SECRET }}
                  refresh-token: ${{ secrets.REFRESH_TOKEN }}